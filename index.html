<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DONKEY MISSION - PARALLAX EDITION</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🫏</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --neon: #00f2ff; --green: #00ff88; --red: #ff3131; 
            --gold: #FFD700; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

        html, body {
            width: 100vw; height: 100dvh; overflow: hidden; 
            background: #111; font-family: 'Orbitron', sans-serif; color: #fff; 
            display: flex; justify-content: center; align-items: center; 
        }

        #phone-container { 
            position: relative; width: 100%; max-width: 420px; height: 100%; 
            background: #000; overflow: hidden; z-index: 10; 
        }

        @media (min-width: 450px) {
            #phone-container { height: 90vh; max-height: 850px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.15); box-shadow: 0 15px 40px rgba(0,0,0,0.8); }
        }

        /* --- DAS NEUE ZWEITEILIGE HINTERGRUND-SYSTEM --- */
        
        /* 1. Der statische Himmel und die Berge (Fixiert) */
        #bg-kopf { 
            position: absolute; 
            top: 0; left: 0; right: 0; 
            height: 40%; /* Nimmt die oberen 40% ein */
            background-color: #2c1b4d; /* Fallback Farbe */
            background-image: url('hintergrund_kopf.png'); 
            background-size: cover; 
            background-position: bottom center; 
            z-index: 1; 
        }

        /* 2. Der gerade, kachelbare Feldweg (Scrollt endlos) */
        #bg-loop { 
            position: absolute; 
            top: 40%; left: 0; right: 0; bottom: 0; 
            background-color: #4a6b2c; /* Fallback Farbe */
            background-image: url('hintergrund_loop.png'); 
            background-size: 100% auto; /* Wichtig: Breite auf 100% fixieren, Höhe automatisch */
            background-position: top center; 
            background-repeat: repeat-y; /* Das Bild wird endlos nach unten wiederholt */
            z-index: 1; 
        }

        /* Abdunklung für bessere Lesbarkeit des Textes */
        #bg-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.5) 100%); z-index: 2; pointer-events: none;}

        #game-wrap { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 20; }
        
        /* --- UI & HUD --- */
        #hud { position: absolute; top: 15px; width: 100%; z-index: 200; padding: 0 15px; pointer-events: none; }
        #mission-title { text-align: center; font-size: 26px; font-weight: 900; color: var(--neon); text-shadow: 0 0 10px var(--neon); margin-bottom: 15px; letter-spacing: 1px;}
        
        #stats-bar { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.6); padding: 10px 15px; border-radius: 12px; border: 1px solid var(--neon); backdrop-filter: blur(5px);}
        .stat { font-weight: 900; font-size: 16px; }

        canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 50; }

        /* --- STEUERUNG --- */
        #controls { position: absolute; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 25px; z-index: 300; }
        .arrow { width: 75px; height: 75px; background: rgba(255,255,255,0.15); border-radius: 50%; color: #fff; font-size: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid rgba(255,255,255,0.3); backdrop-filter: blur(5px); transition: 0.1s;}
        .arrow:active { background: var(--neon); color: #000; transform: scale(0.9); border-color: var(--neon); box-shadow: 0 0 20px var(--neon);}

        /* --- MENÜ SCREENS --- */
        .screen { position: absolute; inset: 0; z-index: 400; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px;}
        .btn-main { padding: 15px 35px; background: var(--green); border: none; border-radius: 12px; font-family: 'Orbitron'; font-weight: 900; font-size: 22px; color: #000; cursor: pointer; margin-top: 30px; box-shadow: 0 5px 0 #00b362; transition: 0.1s;}
        .btn-main:active { transform: translateY(5px); box-shadow: 0 0px 0 #00b362; }
    </style>
</head>
<body>

<div id="phone-container">
    
    <div id="bg-kopf"></div>
    <div id="bg-loop"></div>
    <div id="bg-overlay"></div>

    <div id="game-wrap" style="visibility: hidden;">
        <div id="hud">
            <div id="mission-title">DONKEY MISSION</div>
            <div id="stats-bar">
                <div class="stat" style="color:var(--neon)">LVL <span id="lvl-txt">1</span></div>
                <div id="score-txt" class="stat" style="color:var(--gold)">0 PTS</div>
            </div>
        </div>
        
        <canvas id="canvas"></canvas>

        <div id="controls">
            <div class="arrow" onmousedown="move(-1)" ontouchstart="event.preventDefault(); move(-1)">◀</div>
            <div class="arrow" onmousedown="move(1)" ontouchstart="event.preventDefault(); move(1)">▶</div>
        </div>
    </div>

    <div id="scr-start" class="screen">
        <h1 style="color:var(--gold); font-size: 32px; text-align: center; text-shadow: 0 0 20px rgba(255,215,0,0.5);">DONKEY MISSION</h1>
        <button class="btn-main" onclick="startGame()">START</button>
    </div>

</div>

<script>
let active = false;
let score = 0, level = 1;
let lastT = 0;
let bgScrollY = 0; // Speichert die aktuelle Scroll-Position

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let W = canvas.width = 420;
let H = canvas.height = 800;

// Die drei Spuren (Links, Mitte, Rechts)
const lanes = [W*0.2, W*0.5, W*0.8]; 
let currLane = 1, playerX = lanes[1], targetX = lanes[1];

function startGame() {
    active = true;
    score = 0;
    level = 1;
    document.getElementById("scr-start").style.display = "none";
    document.getElementById("game-wrap").style.visibility = "visible";
    requestAnimationFrame(loop);
}

function move(dir) {
    if(!active) return;
    currLane = Math.max(0, Math.min(2, currLane + dir));
    targetX = lanes[currLane];
}

function loop(t) {
    if(!active) return;
    
    // Berechne die Zeit, die seit dem letzten Frame vergangen ist (dt)
    let dt = (t - (lastT || t)) / 1000;
    lastT = t;
    if(dt > 0.1) dt = 0.016;

    // --- DER FLIESSENDE HINTERGRUND ---
    let speedMult = 1 + (level * 0.15); // Wird pro Level schneller
    
    // Wir addieren die Geschwindigkeit auf die Y-Position
    bgScrollY += (300 * speedMult) * dt; 
    
    // Wir setzen die background-position per CSS. 
    // Da das Bild auf repeat-y steht, loopt es automatisch und nahtlos!
    document.getElementById("bg-loop").style.backgroundPosition = `center ${bgScrollY}px`;

    // --- SPIEL LOGIK ---
    score += 20 * dt;
    if(score > level * 300) {
        level++;
    }
    
    document.getElementById("score-txt").innerText = Math.floor(score) + " PTS";
    document.getElementById("lvl-txt").innerText = level;

    // --- ZEICHNEN ---
    ctx.clearRect(0, 0, W, H);
    
    // Weiche Seitwärtsbewegung
    playerX += (targetX - playerX) * 0.15; 
    
    // Esel zeichnen
    ctx.font = "80px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    
    // Eine leichte Auf- und Ab-Animation, damit es aussieht, als würde er rennen
    let bounce = Math.abs(Math.sin(t * 0.015)) * 12;
    
    // Schatten unter dem Esel
    ctx.fillStyle = "rgba(0,0,0,0.3)";
    ctx.beginPath();
    ctx.ellipse(playerX, H - 100, 30, 10, 0, 0, Math.PI*2);
    ctx.fill();
    
    // Esel
    ctx.fillText("🫏", playerX, H - 120 - bounce);

    requestAnimationFrame(loop);
}
</script>
</body>
</html>
