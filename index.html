<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DONKEY MISSION - HARMONY ENGINE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #111; display: flex; justify-content: center; height: 100vh; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        
        #game { position: relative; width: 100%; max-width: 420px; height: 100%; background: #000; overflow: hidden;}
        canvas { width: 100%; height: 100%; display: block; }
        
        #player { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); font-size: 60px; z-index: 10; transition: left 0.15s ease-out; }
        
        #hud { position: absolute; top: 20px; width: 100%; text-align: center; z-index: 10; pointer-events: none;}
        #hud h2 { color: #00f2ff; text-shadow: 0 0 10px #00f2ff; margin-bottom: 5px; font-size: 26px; letter-spacing: 1px;}
        #score { color: #FFD700; font-size: 20px; }
        
        #controls { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; z-index: 20; }
        .btn { width: 75px; height: 75px; background: rgba(255,255,255,0.15); border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; color: white; display: flex; justify-content: center; align-items: center; font-size: 35px; backdrop-filter: blur(5px); cursor: pointer; transition: 0.1s;}
        .btn:active { background: #00f2ff; color: #000; border-color: #00f2ff; transform: scale(0.9);}
    </style>
</head>
<body>
<div id="game">
    <div id="hud">
        <h2>DONKEY MISSION</h2>
        <div id="score">0 PTS</div>
    </div>
    
    <canvas id="c"></canvas>
    
    <div id="player">🫏</div>
    
    <div id="controls">
        <div class="btn" onmousedown="move(-1)" ontouchstart="event.preventDefault(); move(-1)">◀</div>
        <div class="btn" onmousedown="move(1)" ontouchstart="event.preventDefault(); move(1)">▶</div>
    </div>
</div>

<script>
    const c = document.getElementById('c');
    const ctx = c.getContext('2d');
    
    // Passt die Canvas an jede Handy-Größe an
    function resize() {
        c.width = c.parentElement.clientWidth;
        c.height = c.parentElement.clientHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    let pos = 0;
    let score = 0;
    let lane = 1; // 0=Links, 1=Mitte, 2=Rechts
    const lanes = [20, 50, 80];

    function move(dir) {
        lane = Math.max(0, Math.min(2, lane + dir));
        document.getElementById('player').style.left = lanes[lane] + '%';
    }

    function drawPolygon(points, color) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.moveTo(points[0][0], points[0][1]);
        for(let i=1; i<points.length; i++) ctx.lineTo(points[i][0], points[i][1]);
        ctx.fill();
    }

    let lastTime = 0;

    function loop(time) {
        let dt = (time - lastTime) / 1000;
        if(!lastTime) dt = 0;
        lastTime = time;
        if(dt > 0.1) dt = 0.016;

        pos += 4 * dt; // Bewegungsgeschwindigkeit
        score += 15 * dt;
        document.getElementById('score').innerText = Math.floor(score) + ' PTS';

        let W = c.width;
        let H = c.height;
        let horizon = H * 0.45; // Horizont liegt bei 45% der Bildschirmhöhe

        // --- 1. DER HIMMEL ---
        let sky = ctx.createLinearGradient(0, 0, 0, horizon);
        sky.addColorStop(0, '#0a0026'); // Dunkelblau oben
        sky.addColorStop(0.6, '#4b104b'); // Lila
        sky.addColorStop(1, '#ff4d00'); // Feuriger Sonnenuntergang am Horizont
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, W, horizon);

        // --- 2. DIE SONNE ---
        ctx.fillStyle = '#FFD700';
        ctx.shadowBlur = 30;
        ctx.shadowColor = '#FFD700';
        ctx.beginPath(); 
        ctx.arc(W/2, horizon - 20, 50, 0, Math.PI*2); 
        ctx.fill();
        ctx.shadowBlur = 0; // Reset für den Rest

        // --- 3. DIE BERGE (Statisch) ---
        // Hintere Bergkette
        drawPolygon([[0,horizon], [W*0.15,horizon-60], [W*0.35,horizon]], '#2c1248');
        drawPolygon([[W*0.25,horizon], [W*0.5,horizon-90], [W*0.75,horizon]], '#1b0930');
        drawPolygon([[W*0.6,horizon], [W*0.85,horizon-50], [W,horizon]], '#2c1248');
        // Vordere Bergkette
        drawPolygon([[-20,horizon], [W*0.2,horizon-40], [W*0.4,horizon]], '#4b2a60');
        drawPolygon([[W*0.4,horizon], [W*0.7,horizon-70], [W*1.1,horizon]], '#361b4d');

        // --- 4. DER FLIESSENDE 3D-FELDWEG ---
        // Dieser Block berechnet Zeile für Zeile den Boden und zieht ihn auf dich zu
        for (let y = Math.floor(horizon); y < H; y++) {
            let dy = y - horizon; 
            let z = 100 / (dy + 1); // Mathematische Tiefe

            // Der Weg wird breiter, je weiter unten auf dem Bildschirm er gezeichnet wird
            let roadWidth = dy * 1.1 + 10; 

            // Die Textur wird verschoben (pos), um die Bewegung zu erzeugen
            let tex = (z * 6 + pos) % 2;
            let isDark = tex < 1;

            // Gras an den Seiten
            ctx.fillStyle = isDark ? '#2b4a15' : '#365c1a';
            ctx.fillRect(0, y, W, 1);

            // Brauner Feldweg in der Mitte
            ctx.fillStyle = isDark ? '#5c3a21' : '#734a29';
            ctx.fillRect(W/2 - roadWidth/2, y, roadWidth, 1);
        }

        // --- 5. DER HARMONISCHE ÜBERGANG (FOG) ---
        // Dies verblendet den Feldweg mit dem Himmel, damit es absolut harmonisch aussieht
        let fog = ctx.createLinearGradient(0, horizon, 0, horizon + 35);
        fog.addColorStop(0, '#ff4d00'); // Startet mit der Farbe des Himmels
        fog.addColorStop(1, 'rgba(255, 77, 0, 0)'); // Wird nach unten hin unsichtbar
        ctx.fillStyle = fog;
        ctx.fillRect(0, horizon, W, 35);

        // Nächster Frame
        requestAnimationFrame(loop);
    }
    
    // Startet die Schleife
    requestAnimationFrame(loop);
</script>
</body>
</html>
