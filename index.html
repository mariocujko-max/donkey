<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DONKEY MISSION - FOOLPROOF EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        
        body { 
            background: #111; 
            font-family: 'Orbitron', sans-serif; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; overflow: hidden; color: #fff;
        }

        #game-container { 
            position: relative; width: 100%; max-width: 420px; height: 100%; 
            background: #000; overflow: hidden; border: 1px solid #333;
        }

        /* 1. DER STATISCHE HIMMEL (OBEN) */
        #sky { 
            position: absolute; top: 0; left: 0; width: 100%; height: 40%; 
            /* Fallback: Blau. Wenn das Bild da ist, wird es angezeigt */
            background-color: #1e3a8a;
            background-image: url('hintergrund_top.png'); 
            background-size: cover; 
            background-position: bottom center; 
            z-index: 1; 
        }

        /* 2. DER SCROLLENDE BODEN (UNTEN) */
        #ground { 
            position: absolute; top: 40%; left: 0; width: 100%; height: 60%; 
            /* Fallback: Grüne Streifen. Wenn das Bild da ist, liegt es über den Streifen */
            background-color: #22c55e;
            background-image: url('hintergrund_bottom.png'), repeating-linear-gradient(to bottom, #22c55e, #22c55e 50px, #16a34a 50px, #16a34a 100px); 
            /* WICHTIG: 100% Breite, Höhe passt sich automatisch an, Y-Achse wiederholt sich endlos */
            background-size: 100% auto; 
            background-repeat: repeat-y; 
            z-index: 1; 
        }

        #hud { position: absolute; top: 10px; width: 100%; z-index: 200; padding: 0 20px; text-align: center; }
        .title { color: #00f2ff; font-size: 24px; text-shadow: 0 0 10px #00f2ff; margin-bottom: 10px; }
        
        /* DER ESEL */
        #player {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 60px;
            z-index: 50;
            transition: left 0.15s ease-out; /* Weiche Seitwärtsbewegung */
        }

        /* STEUERUNG */
        #controls { position: absolute; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; z-index: 300; }
        .arrow { width: 70px; height: 70px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; }
        .arrow:active { background: rgba(0, 242, 255, 0.5); }
    </style>
</head>
<body>

<div id="game-container">
    
    <div id="sky"></div>
    <div id="ground"></div>

    <div id="hud">
        <div class="title">DONKEY MISSION</div>
        <div id="pts" style="color: #FFD700;">0 PTS</div>
    </div>

    <div id="player">🫏</div>

    <div id="controls">
        <div class="arrow" onmousedown="move(-1)" ontouchstart="event.preventDefault(); move(-1)">◀</div>
        <div class="arrow" onmousedown="move(1)" ontouchstart="event.preventDefault(); move(1)">▶</div>
    </div>

</div>

<script>
    // Spiel-Variablen
    let scrollY = 0;
    let speed = 250; // Geschwindigkeit des Bodens in Pixeln pro Sekunde
    let lastTime = 0;
    let score = 0;

    // Fahrspuren (Links, Mitte, Rechts in Prozent)
    const lanes = [20, 50, 80]; 
    let currentLane = 1;

    function move(dir) {
        currentLane = Math.max(0, Math.min(2, currentLane + dir));
        document.getElementById('player').style.left = lanes[currentLane] + '%';
    }

    // Die Haupt-Schleife (Game Loop)
    function loop(time) {
        let dt = (time - lastTime) / 1000;
        if (!lastTime) dt = 0;
        lastTime = time;
        if (dt > 0.1) dt = 0.016; // Verhindert Ruckler bei Tab-Wechsel

        // 1. BEWEGUNG DES BODENS
        scrollY += speed * dt;
        
        // Aktualisiere die CSS background-position des Bodens
        // Die X-Position bleibt 'center', die Y-Position wächst endlos
        document.getElementById('ground').style.backgroundPosition = `center ${scrollY}px`;

        // 2. SCORE UPDATEN
        score += 10 * dt;
        document.getElementById('pts').innerText = Math.floor(score) + " PTS";

        requestAnimationFrame(loop);
    }

    // Spiel starten
    requestAnimationFrame(loop);
</script>

</body>
</html>
